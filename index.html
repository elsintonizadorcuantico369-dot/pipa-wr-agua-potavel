<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wr Água Potável - Caminhão Pipa no Rio de Janeiro e Região</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #08090C;
            --primary-blue: #1A6FD4;
            --light-blue: #4D9FFF;
            --white-text: #F2F4F8;
            --dark-gray-text: #A0A0A0;
            --card-bg: #15161A;
            --footer-bg: #0F1014;
        }

        /* General Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Barlow', sans-serif;
            color: var(--white-text);
            background-color: var(--bg-color);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            color: var(--white-text);
            line-height: 1.2;
        }

        p {
            margin-bottom: 1em;
        }

        a {
            color: var(--light-blue);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--primary-blue);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .btn {
            display: inline-block;
            background-color: var(--primary-blue);
            color: var(--white-text);
            padding: 15px 30px;
            border-radius: 8px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.2em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
</body>
</html>
